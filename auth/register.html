<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription | Loc'Reaction VTC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--primary:#551B8C;--primary-light:#7e3db0;--primary-xlight:rgba(85,27,140,0.08);--gold:#FFCC00;--gold-dark:#e6b800;--dark:#1a1a2e;--white:#fff;--gray:#7c7c9e;--gray-light:#e8e4f0;--gray-xlight:#f9f7fd;--success:#27ae60;--danger:#e74c3c;--shadow-md:0 6px 24px rgba(85,27,140,0.12);--shadow-lg:0 12px 48px rgba(85,27,140,0.18);--radius:12px;--radius-xl:24px;--radius-pill:9999px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;min-height:100vh;background:var(--gray-xlight);display:flex;align-items:center;justify-content:center;padding:24px;}
.register-card{background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:600px;overflow:hidden;}
.register-header{background:linear-gradient(135deg,var(--primary),#3d1266);padding:32px 36px;text-align:center;}
.register-logo{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:8px;}
.register-logo span{color:var(--gold);}
.register-header h2{font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:4px;}
.register-header p{font-size:0.85rem;color:rgba(255,255,255,0.7);}
.role-tabs{display:flex;gap:6px;background:rgba(255,255,255,0.1);padding:5px;border-radius:var(--radius);margin-top:20px;}
.role-tab{flex:1;padding:9px;text-align:center;border-radius:calc(var(--radius) - 2px);font-size:0.8rem;font-weight:600;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;border:none;background:none;font-family:'Poppins',sans-serif;}
.role-tab.active{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);}
.register-body{padding:32px 36px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:0.82rem;font-weight:600;color:var(--dark);margin-bottom:7px;}
.form-label .req{color:var(--danger);}
.form-icon-wrap{position:relative;}
.form-icon-wrap input,.form-icon-wrap select{width:100%;padding:11px 16px 11px 44px;border:1.5px solid var(--gray-light);border-radius:var(--radius);font-size:0.9rem;color:var(--dark);background:var(--white);outline:none;transition:all 0.2s;font-family:'Poppins',sans-serif;}
.form-icon-wrap input:focus,.form-icon-wrap select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-xlight);}
.form-icon-wrap i:not(.eye-toggle){position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:0.95rem;pointer-events:none;}
.eye-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gray);cursor:pointer;}
.eye-toggle:hover{color:var(--primary);}
.chauffeur-fields{display:none;}
.chauffeur-fields.show{display:block;}
.section-divider{font-size:0.8rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;padding-bottom:10px;border-bottom:1px solid var(--primary-xlight);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.cgv-wrap{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;}
.cgv-wrap input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
.cgv-wrap label{font-size:0.82rem;color:var(--gray);}
.cgv-wrap label a{color:var(--primary);font-weight:600;}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:var(--radius);font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.login-link{text-align:center;font-size:0.85rem;color:var(--gray);margin-top:16px;}
.login-link a{color:var(--primary);font-weight:700;}
.toast-area{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:10px;}
.toast{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:14px;background:var(--dark);color:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.2);min-width:280px;font-size:0.85rem;font-weight:500;animation:toastIn 0.4s ease;}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}
@media(max-width:600px){.register-body{padding:24px 20px;} .form-row{grid-template-columns:1fr;} .register-header{padding:24px 20px;}}
</style>
</head>
<body>
<div class="register-card">
  <div class="register-header">
    <div class="register-logo">⚡ Loc'<span>Reaction</span></div>
    <h2>Créer un compte</h2>
    <p>Rejoignez la plateforme VTC premium de France</p>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('client',this)"><i class="fas fa-user"></i> Client</button>
      <button class="role-tab" onclick="setRole('chauffeur',this)"><i class="fas fa-car"></i> Chauffeur</button>
    </div>
  </div>
  <div class="register-body">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom <span class="req">*</span></label>
        <div class="form-icon-wrap"><i class="fas fa-user"></i><input type="text" id="prenom" placeholder="Jean"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Nom <span class="req">*</span></label>
        <div class="form-icon-wrap"><i class="fas fa-user"></i><input type="text" id="nom" placeholder="Dupont"></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Adresse email <span class="req">*</span></label>
      <div class="form-icon-wrap"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="votre@email.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Téléphone <span class="req">*</span></label>
        <div class="form-icon-wrap"><i class="fas fa-phone"></i><input type="tel" id="tel" placeholder="+33 6 XX XX XX XX"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Ville <span class="req">*</span></label>
        <div class="form-icon-wrap"><i class="fas fa-city"></i><input type="text" id="ville" placeholder="Paris"></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe <span class="req">*</span></label>
      <div class="form-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Min. 6 caractères"><i class="fas fa-eye eye-toggle" onclick="togglePwd()"></i></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe <span class="req">*</span></label>
      <div class="form-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="confirm-password" placeholder="Répétez votre mot de passe"></div>
    </div>

    <!-- Champs chauffeur -->
    <div class="chauffeur-fields" id="chauffeur-fields">
      <div class="section-divider"><i class="fas fa-car"></i> Informations Véhicule</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Marque & Modèle</label>
          <div class="form-icon-wrap"><i class="fas fa-car-alt"></i><input type="text" id="voiture" placeholder="Mercedes Classe E"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Plaque d'immatriculation</label>
          <div class="form-icon-wrap"><i class="fas fa-id-card"></i><input type="text" id="plaque" placeholder="AA-123-BB"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Numéro de carte professionnelle VTC</label>
        <div class="form-icon-wrap"><i class="fas fa-id-badge"></i><input type="text" id="carte-vtc" placeholder="VTC-2025-XXXXX"></div>
      </div>
    </div>

    <div class="cgv-wrap">
      <input type="checkbox" id="cgv">
      <label for="cgv">J'accepte les <a href="#">Conditions Générales d'Utilisation</a> et la <a href="#">Politique de Confidentialité</a> de Loc'Reaction.</label>
    </div>
    <button class="btn-submit" onclick="register()"><i class="fas fa-user-plus"></i> Créer mon compte</button>
    <div class="login-link">Déjà inscrit ? <a href="login.html">Se connecter</a></div>
  </div>
</div>

<div class="toast-area" id="toast-area"></div>
<script src="../assets/js/store.js"></script>
<script>
let currentRole = 'client';
const params = new URLSearchParams(location.search);
if (params.get('role') === 'chauffeur') {
  setRole('chauffeur', document.querySelectorAll('.role-tab')[1]);
}
function setRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const cf = document.getElementById('chauffeur-fields');
  if (role==='chauffeur') cf.classList.add('show'); else cf.classList.remove('show');
}
function togglePwd() {
  const i=document.getElementById('password');
  i.type = i.type==='password'?'text':'password';
}
function toast(msg,type='error') {
  const a=document.getElementById('toast-area');
  const t=document.createElement('div'); t.className=`toast ${type}`;
  t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i> ${msg}`;
  a.appendChild(t); setTimeout(()=>t.remove(),3500);
}
function register() {
  const prenom   = document.getElementById('prenom').value.trim();
  const nom      = document.getElementById('nom').value.trim();
  const email    = document.getElementById('email').value.trim();
  const tel      = document.getElementById('tel').value.trim();
  const ville    = document.getElementById('ville').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm-password').value;
  const cgv      = document.getElementById('cgv').checked;

  if (!prenom||!nom||!email||!tel||!ville||!password) { toast('Veuillez remplir tous les champs obligatoires.'); return; }
  if (password.length < 6) { toast('Le mot de passe doit contenir au moins 6 caractères.'); return; }
  if (password !== confirm) { toast('Les mots de passe ne correspondent pas.'); return; }
  if (!cgv) { toast('Veuillez accepter les CGU pour continuer.'); return; }

  const existing = LR.getUsers().find(u=>u.email===email);
  if (existing) { toast('Cet email est déjà utilisé.'); return; }

  const userData = { role:currentRole, prenom, nom, email, tel, ville, password, avatar:prenom[0]+nom[0] };
  if (currentRole==='chauffeur') {
    userData.voiture = document.getElementById('voiture').value.trim();
    userData.plaque  = document.getElementById('plaque').value.trim();
    userData.note    = 5.0; userData.coursesTotal = 0; userData.disponible = false;
  }
  const user = LR.createUser(userData);
  LR.creditWallet(user.id, 0, '');
  toast('Compte créé avec succès ! Connexion en cours…','success');
  setTimeout(()=>{
    LR.login(email,password);
    const dest={client:'../client/dashboard.html',chauffeur:'../driver/dashboard.html'};
    window.location.href=dest[currentRole]||'../index.html';
  },1200);
}
const s=LR.getSession(); if(s){window.location.href=LR._dashboardFor(s.role);}
</script>
</body>
</html>
